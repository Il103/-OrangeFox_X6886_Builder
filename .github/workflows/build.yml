name: Build OrangeFox R12.0.1 BETA

on:
  workflow_dispatch:
    inputs:
      device_tree:
        description: Device Tree URL
        required: true
        default: https://github.com/Il103/twrp_device_infinix_X6886.git
      device_branch:
        description: Device Tree Branch
        required: true
        default: main
      fox_branch:
        description: OrangeFox Branch
        required: true
        default: fox_12.1
        type: choice
        options:
          - fox_12.1
          - fox_r12
      build_target:
        description: Build Target
        required: true
        default: recoveryimage
        type: choice
        options:
          - recoveryimage
          - vendorbootimage
          - bootimage
      enable_telegram:
        description: Send Telegram Notification
        required: true
        default: true
        type: boolean
      auto_release:
        description: Create Auto Release
        required: true
        default: true
        type: boolean

env:
  TZ: Africa/Cairo
  DEVICE_CODENAME: X6886
  DEVICE_NAME: Infinix HOT 60 Pro+
  FOX_VERSION: R12.0.1_BETA
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build OrangeFox
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Set Build Date
      id: date
      run: echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        repository: Il103/twrp_device_infinix_X6886
        ref: ${{ github.event.inputs.device_branch }}
        path: device/infinix/X6886
        fetch-depth: 1

    - name: Show Build Info
      run: |
        echo "=========================================="
        echo "  OrangeFox Build Started"
        echo "  Device: ${{ env.DEVICE_NAME }} (${{ env.DEVICE_CODENAME }})"
        echo "  Version: ${{ env.FOX_VERSION }}"
        echo "  Branch: ${{ github.event.inputs.device_branch }}"
        echo "  Fox Branch: ${{ github.event.inputs.fox_branch }}"
        echo "  Target: ${{ github.event.inputs.build_target }}"
        echo "  Date: ${{ env.BUILD_DATE }}"
        echo "=========================================="

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq           git-core gnupg flex bison build-essential zip curl           zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386           libncurses5 lib32ncurses5-dev x11proto-core-dev           libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils           xsltproc unzip fontconfig python3 python3-pip ccache bc           libssl-dev imagemagick schedtool
        ccache -M 20G
        ccache -s

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        export PATH="$HOME/bin:$PATH"
        repo --version

    - name: Sync TWRP AOSP Sources
      id: sync
      run: |
        export PATH="$HOME/bin:$PATH"
        mkdir -p /tmp/OrangeFox
        cd /tmp/OrangeFox
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        echo "Initializing repo..."
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --no-repo-verify --depth=1
        echo "Repo init done. Syncing..."
        repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc --all) ||         repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc --all)
        echo "Sync complete!"
        ls -la

    - name: Setup Device Tree
      run: |
        echo "Setting up device tree..."
        cd /tmp/OrangeFox
        mkdir -p device/infinix
        rm -rf device/infinix/X6886
        cp -r $GITHUB_WORKSPACE/device/infinix/X6886 device/infinix/X6886
        ls -la device/infinix/X6886/

    - name: Clone OrangeFox Vendor
      run: |
        cd /tmp/OrangeFox
        git clone --depth=1 https://gitlab.com/OrangeFox/vendor/recovery.git vendor/recovery
        cd vendor/recovery
        git checkout ${{ github.event.inputs.fox_branch }}

    - name: Fix vendorsetup.sh Warning
      run: |
        echo "Fixing vendorsetup.sh..."
        cd /tmp/OrangeFox/device/infinix/X6886
        if [ -f vendorsetup.sh ]; then
          echo "# Fixed vendorsetup.sh - COMMON_LUNCH_CHOICES moved to AndroidProducts.mk" > vendorsetup.sh
          echo "# This file is kept for compatibility" >> vendorsetup.sh
          cat vendorsetup.sh
        fi

    - name: Fix AndroidProducts.mk
      run: |
        echo "Fixing AndroidProducts.mk..."
        cd /tmp/OrangeFox/device/infinix/X6886
        if [ -f AndroidProducts.mk ]; then
          cat AndroidProducts.mk
          if ! grep -q "COMMON_LUNCH_CHOICES" AndroidProducts.mk; then
            echo "" >> AndroidProducts.mk
            echo "COMMON_LUNCH_CHOICES := \" >> AndroidProducts.mk
            echo "    omni_X6886-eng \" >> AndroidProducts.mk
            echo "    omni_X6886-userdebug \" >> AndroidProducts.mk
            echo "    omni_X6886-user" >> AndroidProducts.mk
          fi
          cat AndroidProducts.mk
        fi

    - name: Build OrangeFox
      id: build_step
      run: |
        cd /tmp/OrangeFox
        source build/envsetup.sh || true
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_DEVICE=${{ env.DEVICE_CODENAME }}
        export FOX_VARIANT="${{ env.FOX_VERSION }}"
        export FOX_USE_LZMA_COMPRESSION=1
        export FOX_ASH_IS_BASH=1
        export FOX_REPLACE_BUSYBOX_PS=1
        export FOX_REPLACE_TOOLBOX_GETPROP=1
        export FOX_USE_NANO_EDITOR=1
        export FOX_USE_TAR_BINARY=1
        export FOX_USE_ZIP_BINARY=1
        export FOX_USE_SED_BINARY=1
        export FOX_USE_XZ_UTILS=1
        export FOX_ENABLE_APP_MANAGER=1
        export OF_SKIP_FBE_DECRYPTION=0
        export OF_SUPPORT_ALL_BLOCK_OTA_UPDATES=1
        export OF_FIX_OTA_UPDATE_MANUAL_FLASH_ERROR=1
        export OF_PATCH_AVB20=1
        export OF_USE_MAGISKBOOT_FOR_ALL_PATCHES=1
        export FOX_AB_DEVICE=1
        export LC_ALL=C
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 20G
        echo "Running lunch..."
        lunch omni_X6886-eng || lunch twrp_X6886-eng || true
        echo "Running build..."
        mka adbd ${{ github.event.inputs.build_target }} || true
        echo "Build command finished"

    - name: Check Output
      id: check_output
      run: |
        OUT_DIR="/tmp/OrangeFox/out/target/product/${{ env.DEVICE_CODENAME }}"
        echo "Checking output in: $OUT_DIR"
        ls -la "$OUT_DIR" || true
        mkdir -p $GITHUB_WORKSPACE/output
        for img in "$OUT_DIR"/*.img; do
          if [ -f "$img" ]; then
            cp -v "$img" "$GITHUB_WORKSPACE/output/"
          fi
        done
        ls -la $GITHUB_WORKSPACE/output/ || true
        OUTPUT_LIST=$(ls $GITHUB_WORKSPACE/output/ 2>/dev/null | tr \'\n\' \' \')
        echo "OUTPUT_FILES=$OUTPUT_LIST" >> $GITHUB_ENV
        if [ -z "$OUTPUT_LIST" ]; then
          echo "BUILD_STATUS=FAILED" >> $GITHUB_ENV
        else
          echo "BUILD_STATUS=SUCCESS" >> $GITHUB_ENV
        fi

    - name: Upload Artifacts
      if: env.BUILD_STATUS == 'SUCCESS'
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-${{ env.FOX_VERSION }}-${{ env.DEVICE_CODENAME }}-${{ env.BUILD_DATE }}
        path: /tmp/OrangeFox/out/target/product/${{ env.DEVICE_CODENAME }}/*.img
        retention-days: 30

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs-${{ env.BUILD_DATE }}
        path: |
          /tmp/OrangeFox/out/**/*.log
          /tmp/OrangeFox/**/*.log
        retention-days: 7

    - name: Create Release
      if: github.event.inputs.auto_release == 'true' && env.BUILD_STATUS == 'SUCCESS'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.FOX_VERSION }}-${{ env.BUILD_DATE }}
        name: OrangeFox ${{ env.FOX_VERSION }} for ${{ env.DEVICE_NAME }}
        body: |
          ## OrangeFox Recovery ${{ env.FOX_VERSION }}

          **Device:** ${{ env.DEVICE_NAME }} (${{ env.DEVICE_CODENAME }})
          **Build Date:** ${{ env.BUILD_DATE }}
          **Android:** 16 (OxygenOS 16 compatible)
          **Target:** ${{ github.event.inputs.build_target }}

          ### Warning
          - This is a BETA build
          - Always backup before flashing
          - Test with `fastboot boot` first

          ### Notes
          - Supports Android 12-16 decryption
          - OxygenOS 16 / HyperOS compatible
          - MT6789 platform

          ### Flashing
          ```bash
          fastboot flash ${{ github.event.inputs.build_target }} OrangeFox-*.img
          # or for testing:
          fastboot boot OrangeFox-*.img
          ```

          ### Credits
          - OrangeFox Team
          - Device Tree by Il103
        files: /tmp/OrangeFox/out/target/product/${{ env.DEVICE_CODENAME }}/*.img
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Telegram Success
      if: github.event.inputs.enable_telegram == 'true' && env.BUILD_STATUS == 'SUCCESS'
      run: |
        TG_CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
        TG_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
        if [ -z "$TG_CHAT" ] || [ -z "$TG_TOKEN" ]; then
          echo "Telegram secrets not configured"
          exit 0
        fi
        MSG="Build Complete: ${{ env.FOX_VERSION }} for ${{ env.DEVICE_NAME }}\nDate: ${{ env.BUILD_DATE }}\nTarget: ${{ github.event.inputs.build_target }}\nFiles: ${{ env.OUTPUT_FILES }}\nBuilder: ${{ github.actor }}\n\nDownload: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage"           -d chat_id="$TG_CHAT" -d text="$MSG"

    - name: Telegram Failure
      if: github.event.inputs.enable_telegram == 'true' && env.BUILD_STATUS != 'SUCCESS'
      run: |
        TG_CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
        TG_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
        if [ -z "$TG_CHAT" ] || [ -z "$TG_TOKEN" ]; then
          echo "Telegram secrets not configured"
          exit 0
        fi
        MSG="Build Failed: ${{ env.FOX_VERSION }} for ${{ env.DEVICE_NAME }}\nDate: ${{ env.BUILD_DATE }}\nTarget: ${{ github.event.inputs.build_target }}\nBuilder: ${{ github.actor }}\n\nCheck Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage"           -d chat_id="$TG_CHAT" -d text="$MSG"

    - name: Build Summary
      if: always()
      run: |
        echo "=========================================="
        echo "  OrangeFox Build Summary"
        echo "  Device: ${{ env.DEVICE_NAME }}"
        echo "  Version: ${{ env.FOX_VERSION }}"
        echo "  Date: ${{ env.BUILD_DATE }}"
        echo "  Target: ${{ github.event.inputs.build_target }}"
        echo "  Output: ${{ env.OUTPUT_FILES }}"
        echo "  Status: ${{ env.BUILD_STATUS }}"
        echo "=========================================="
