name: 🦊 Build OrangeFox R12.0.1 BETA

on:
  workflow_dispatch:
    inputs:
      device_tree:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/Il103/twrp_device_infinix_X6886.git'
      device_branch:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      fox_branch:
        description: 'OrangeFox Branch'
        required: true
        default: 'fox_12.1'
        type: choice
        options:
          - fox_12.1
          - fox_r12

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sushrut1101/docker:arch

    steps:
    - name: 🔔 Checkout Device Tree
      uses: actions/checkout@v4
      with:
        repository: Il103/twrp_device_infinix_X6886
        ref: ${{ github.event.inputs.device_branch }}
        path: device/infinix/X6886

    - name: 🛠️ Install Dependencies
      run: |
        echo "Installing dependencies..."
        pacman -Syu --noconfirm
        pacman -S --noconfirm git repo xmlstarlet python3 ccache bc libxml2

    - name: 📥 Sync OrangeFox Sources
      run: |
        echo "Syncing OrangeFox R12 sources..."
        mkdir -p ~/OrangeFox
        cd ~/OrangeFox
        repo init -u https://gitlab.com/OrangeFox/misc/scripts.git -b master --no-repo-verify
        repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc --all) || repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc --all)

    - name: 🔧 Setup Device Tree
      run: |
        echo "Setting up device tree..."
        cd ~/OrangeFox
        rm -rf device/infinix/X6886
        cp -r $GITHUB_WORKSPACE/device/infinix/X6886 device/infinix/X6886

    - name: 🦊 Clone OrangeFox Vendor
      run: |
        echo "Cloning OrangeFox vendor..."
        cd ~/OrangeFox
        git clone https://gitlab.com/OrangeFox/vendor/recovery.git vendor/recovery
        cd vendor/recovery
        git checkout ${{ github.event.inputs.fox_branch }}

    - name: ⚙️ Build Environment Setup
      run: |
        echo "Setting up build environment..."
        cd ~/OrangeFox
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_DEVICE=X6886
        export FOX_VARIANT="R12.0.1_BETA"
        export FOX_USE_LZMA_COMPRESSION=1
        export FOX_ASH_IS_BASH=1
        export FOX_REPLACE_BUSYBOX_PS=1
        export FOX_REPLACE_TOOLBOX_GETPROP=1
        export FOX_USE_NANO_EDITOR=1
        export FOX_USE_TAR_BINARY=1
        export FOX_USE_ZIP_BINARY=1
        export FOX_USE_SED_BINARY=1
        export FOX_USE_XZ_UTILS=1
        export FOX_ENABLE_APP_MANAGER=1
        export OF_SKIP_FBE_DECRYPTION=0
        export OF_SUPPORT_ALL_BLOCK_OTA_UPDATES=1
        export OF_FIX_OTA_UPDATE_MANUAL_FLASH_ERROR=1
        export OF_PATCH_AVB20=1
        export OF_USE_MAGISKBOOT_FOR_ALL_PATCHES=1
        export FOX_AB_DEVICE=1
        export LC_ALL=C

    - name: 🚀 Build OrangeFox
      run: |
        echo "Starting build..."
        cd ~/OrangeFox
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_DEVICE=X6886
        export FOX_VARIANT="R12.0.1_BETA"
        export FOX_USE_LZMA_COMPRESSION=1
        export FOX_ASH_IS_BASH=1
        export FOX_REPLACE_BUSYBOX_PS=1
        export FOX_REPLACE_TOOLBOX_GETPROP=1
        export FOX_USE_NANO_EDITOR=1
        export FOX_USE_TAR_BINARY=1
        export FOX_USE_ZIP_BINARY=1
        export FOX_USE_SED_BINARY=1
        export FOX_USE_XZ_UTILS=1
        export FOX_ENABLE_APP_MANAGER=1
        export OF_SKIP_FBE_DECRYPTION=0
        export OF_SUPPORT_ALL_BLOCK_OTA_UPDATES=1
        export OF_FIX_OTA_UPDATE_MANUAL_FLASH_ERROR=1
        export OF_PATCH_AVB20=1
        export OF_USE_MAGISKBOOT_FOR_ALL_PATCHES=1
        export FOX_AB_DEVICE=1
        export LC_ALL=C
        lunch twrp_X6886-eng
        mka adbd vendorbootimage

    - name: 📦 Package Output
      run: |
        echo "Packaging output..."
        cd ~/OrangeFox/out/target/product/X6886
        ls -la
        mkdir -p $GITHUB_WORKSPACE/output
        cp -v vendor_boot.img $GITHUB_WORKSPACE/output/OrangeFox-R12.0.1-X6886-vendor_boot.img || true
        cp -v recovery.img $GITHUB_WORKSPACE/output/OrangeFox-R12.0.1-X6886-recovery.img || true
        cp -v boot.img $GITHUB_WORKSPACE/output/OrangeFox-R12.0.1-X6886-boot.img || true

    - name: 📤 Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-R12.0.1-X6886-${{ github.run_number }}
        path: ~/OrangeFox/out/target/product/X6886/*.img

    - name: ✅ Build Complete
      run: |
        echo "Build completed successfully!"
        ls -la ~/OrangeFox/out/target/product/X6886/
        
